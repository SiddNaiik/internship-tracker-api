services:
  db:
    image: postgres:16
    container_name: internship_tracker_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: internship_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d internship_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: